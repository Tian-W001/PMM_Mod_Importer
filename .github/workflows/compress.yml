name: Package PMM Mod Importer

on:
  workflow_dispatch:

jobs:
  bundle:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Prepare Folder Structure
        run: |
          mkdir PMM_Mod_Importer
          cp LICENSE README.md content.js icon128.png manifest.json popup.html popup.js PMM_Mod_Importer/

      - name: Create Zip Archive
        run: |
          zip -r PMM_Mod_Importer.zip PMM_Mod_Importer/

      - name: Upload Extension Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pmm-mod-importer-bundle
          path: PMM_Mod_Importer.zip
          retention-days: 5