name: Package PMM Mod Importer

on:
  workflow_dispatch:

jobs:
  bundle:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read Version From Manifest
        id: manifest_version
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('PMM_Mod_Importer/manifest.json', encoding='utf-8'))['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create Zip Archive
        run: |
          zip -r PMM_Mod_Importer.zip PMM_Mod_Importer/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.manifest_version.outputs.version }}
          name: Release v${{ steps.manifest_version.outputs.version }}
          files: PMM_Mod_Importer.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}